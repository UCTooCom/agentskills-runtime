[package]
  cjc-version = "1.0.0"
  compile-option = "-Woff all --dy-std --cfg \"faiss=disable,sqlite=disable,llamacpp=disable,http=cj\""
  description = "AgentSkills Runtime - A Cangjie implementation of the AgentSkills open standard"
  link-option = ""
  name = "magic"
  output-type = "dynamic"
  src-dir = ""
  target-dir = ""
  version = "0.0.20"

[dependencies]
  yaml4cj = { path = "./libs/yaml4cj" }
  commonmark4cj = { path = "./libs/commonmark4cj" }
  f_orm = { path = "./libs/fountain/f_orm" }
  f_data = { path = "./libs/fountain/f_data" }
  f_config = { path = "./libs/fountain/f_config" }
  f_util = { path = "./libs/fountain/f_util" }
  charset4cj = { git = "https://gitcode.com/Cangjie-TPC/charset4cj.git", branch = "develop", compile-option = "-Woff unused" }
  jwt4cj = { git = "https://gitcode.com/Cangjie-TPC/jwt4cj.git", branch = "develop", compile-option = "-Woff unused" }
  logcj = { git = "https://gitcode.com/Cangjie-TPC/log-cj.git", branch = "develop", compile-option = "-Woff unused" }
  opengauss = { git = "https://gitcode.com/Cangjie-TPC/opengauss-driver.git", branch = "master", compile-option = "-Woff unused" }
#  redis_sdk = { path = "../CangjieMagic/resource/TPC/redis-sdk"}
#  pbkdf2 = { path = "../CangjieMagic/resource/TPC/pbkdf2" }
#  hicrypto = { path = "../CangjieMagic/resource/TPC/hicrypto" }
  blowfish = { path = "./libs/blowfish-cj" }
  json4cj = { path = "./libs/json4cj" }


#----------------------------------------
#  Build Profile Configuration
#----------------------------------------
[profile.build]
  incremental = true    # 启用增量编译,只编译改动的模块
  lto = "thin"          # 链接时优化: full|thin (thin编译更快,full优化更好)

[target.aarch64-linux-ohos]
  compile-option = "-B \"${DEVECO_CANGJIE_HOME}/compiler/third_party/llvm/bin\" -B \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/build/linux_ohos_aarch64_llvm/openssl\" --sysroot \"${DEVECO_CANGJIE_HOME}/musl\" --cfg \"ohos=true\""
  [target.aarch64-linux-ohos.bin-dependencies]
    path-option = [ "${AARCH64_LIBS}", "${AARCH64_MACRO_LIBS}" ]

[target.x86_64-linux-ohos]
  compile-option = "-B \"${DEVECO_CANGJIE_HOME}/compiler/third_party/llvm/bin\" -B \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/x86_64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/x86_64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/build/linux_ohos_x86_64_llvm/openssl\" --sysroot \"${DEVECO_CANGJIE_HOME}/musl\" --cfg \"ohos=true\""
  [target.x86_64-linux-ohos.bin-dependencies]
    path-option = [ "${X86_64_OHOS_LIBS}", "${X86_64_OHOS_MACRO_LIBS}" ]

[target.x86_64-unknown-linux-gnu]
  compile-option = "--cfg \"ohos=false\""


