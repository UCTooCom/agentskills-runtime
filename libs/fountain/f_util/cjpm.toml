[dependencies]
  f_base  = {path = "../f_base", version = "1.0.45"}
  f_collection  = {path = "../f_collection", version = "1.0.45"}
  f_config  = {path = "../f_config", version = "1.0.45"}
  f_data  = {path = "../f_data", version = "1.0.45"}
  f_exception  = {path = "../f_exception", version = "1.0.45"}
  f_regex  = {path = "../f_regex", version = "1.0.45"}
  f_random  = {path = "../f_random", version = "1.0.45"}
  f_time  = {path = "../f_time", version = "1.0.45"}
  stdx = { path = "../../cangjie-stdx-windows-x64-1.0.0.1/windows_x86_64_llvm" }
[package]
  cjc-version = "1.0.4"
  compile-option = "-Woff all --dy-std"
  override-compile-option = "-Woff all --dy-std"
  description = "crc16/密钥交换协议/命名风格转换/常用设计模式/geohash/snowflake/UUID/murmur_hash/路径匹配/文本模板/树结构转换/"
  link-option = ""
  name = "f_util"
  output-type = "dynamic"
  src-dir = ""
  target-dir = ""
  version = "1.0.45"
  package-configuration = {}
  category = ["Utility"]
  license = ["Apache-2.0"]
  include = ["src"]
  authors = ["吴京润"]

[target]
[target.x86_64-unknown-linux-gnu]
  compile-option = "-Woff all --dy-std -ldl"
  override-compile-option = "-Woff all --dy-std -ldl"
[target.x86_64-unknown-linux-gnu.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
[target.aarch64-unknown-linux-gnu]
  compile-option = "-Woff all --dy-std -ldl"
  override-compile-option = "-Woff all --dy-std -ldl"
[target.aarch64-unknown-linux-gnu.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
[target.x86_64-w64-mingw32]
  compile-option = "-Woff all --dy-std -lcrypt32"
  override-compile-option = "-Woff all --dy-std -lcrypt32"
[target.x86_64-w64-mingw32.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
[target.x86_64-apple-darwin]
  compile-option = "-Woff all --dy-std"
  override-compile-option = "-Woff all --dy-std"
[target.x86_64-apple-darwin.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
[target.aarch64-apple-darwin]
  compile-option = "-Woff all --dy-std"
  override-compile-option = "-Woff all --dy-std"
[target.aarch64-apple-darwin.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
[target.aarch64-linux-ohos]
  compile-option = "-Woff all --dy-std -ldl"
  override-compile-option = "-Woff all --dy-std -ldl"
[target.aarch64-linux-ohos.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
[target.x86_64-linux-ohos]
  compile-option = "-Woff all --dy-std -ldl"
  override-compile-option = "-Woff all --dy-std -ldl"
[target.x86_64-linux-ohos.bin-dependencies]
  path-option = ["${CANGJIE_STDX_DYNAMIC_PATH}"]
  
[profile.build]
#  lto = "full"
  incremental = true
