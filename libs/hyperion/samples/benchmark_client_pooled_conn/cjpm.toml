[dependencies]

[package]
  vendor = "Beijing Baolande Software Corporation"
  cjc-version = "1.0.0"
  name = "benchmark_client_pooled_conn"
  description = "BenchMark client with pooled connection"
  version = "3.0.0"
  compile-option = "-O2"
  link-option = ""
  output-type = "executable"
  src-dir = "src"
  target-dir = "build"
  package-configuration = {}

[target]
    [target.x86_64-unknown-linux-gnu]
        [target.x86_64-unknown-linux-gnu.bin-dependencies]
            path-option = ["${CANGJIE_STDX_PATH}", "../../build/release/hyperion/"]
    [target.aarch64-unknown-linux-gnu]
        [target.aarch64-unknown-linux-gnu.bin-dependencies]
            path-option = ["${CANGJIE_STDX_PATH}", "../../build/release/hyperion/"]
    [target.x86_64-apple-darwin]
        [target.x86_64-apple-darwin.bin-dependencies]
            path-option = ["${CANGJIE_STDX_PATH}", "../../build/release/hyperion/"]
    [target.aarch64-apple-darwin]
        [target.aarch64-apple-darwin.bin-dependencies]
            path-option = ["${CANGJIE_STDX_PATH}", "../../build/release/hyperion/"]
    [target.x86_64-w64-mingw32]
        [target.x86_64-w64-mingw32.bin-dependencies]
            path-option = ["${CANGJIE_STDX_PATH}", "../../build/release/hyperion/"]