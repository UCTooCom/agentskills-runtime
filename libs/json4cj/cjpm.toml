[dependencies]
  stdx = { path = "../cangjie-stdx-windows-x64-1.0.0.1/windows_x86_64_llvm" }

[package]
  cjc-version = "1.0.1"
  name = "json4cj"
  version = "1.0.0"
  description = "A Jackson-inspired JSON serialization library for Cangjie, powered by compile-time macro code generation with zero runtime overhead."
  output-type = "dynamic"
  compile-option = "-Woff unused"
  # compile-option = "--debug-macro -Woff unused"  # uncomment for macro debugging


[profile]
  [profile.build]
    incremental = true
  [profile.customized-option]
    debug = "-g -Woff all"
    release = "--fast-math -O2 -s -Woff all"
  [profile.test]

  #----------------------------------------
#  Setting cangjie-stdx
#----------------------------------------

[target.aarch64-linux-ohos]
  compile-option = "-B \"${DEVECO_CANGJIE_HOME}/compiler/third_party/llvm/bin\" -B \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/build/linux_ohos_aarch64_llvm/openssl\" --sysroot \"${DEVECO_CANGJIE_HOME}/musl\""
  [target.aarch64-linux-ohos.bin-dependencies]
    path-option = [ "${AARCH64_LIBS}", "${AARCH64_MACRO_LIBS}", "${AARCH64_KIT_LIBS}" ]
    [target.aarch64-linux-ohos.bin-dependencies.package-option]

[target.x86_64-linux-ohos]
  compile-option = "-B \"${DEVECO_CANGJIE_HOME}/compiler/third_party/llvm/bin\" -B \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/x86_64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/x86_64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/build/linux_ohos_x86_64_llvm/openssl\" --sysroot \"${DEVECO_CANGJIE_HOME}/musl\""
  [target.x86_64-linux-ohos.bin-dependencies]
    path-option = [ "${X86_64_OHOS_LIBS}", "${X86_64_OHOS_MACRO_LIBS}", "${X86_64_OHOS_KIT_LIBS}" ]

[target.x86_64-unknown-linux-gnu.bin-dependencies]
  path-option = ["../cangjie-stdx-linux-x64-1.0.0.1/linux_x86_64_llvm/dynamic/stdx"]

[target.x86_64-unknown-windows-gnu]
  compile-option = "--cfg \"ohos=false\""
[target.x86_64-unknown-windows-gnu.bin-dependencies]
  path-option = ["../cangjie-stdx-windows-x64-1.0.0.1/windows_x86_64_llvm/dynamic/stdx"]

[target.x86_64-w64-mingw32]
  compile-option = "-Woff unused -Woff deprecated --dy-std --cfg \"ohos=false\""
[target.x86_64-w64-mingw32.bin-dependencies]
  path-option = ["../cangjie-stdx-windows-x64-1.0.0.1/windows_x86_64_llvm/dynamic/stdx"]

[target.aarch64-unknown-linux-gnu]
  compile-option = "--cfg \"ohos=false\""
[target.aarch64-unknown-linux-gnu.bin-dependencies]
  path-option = ["../cangjie-stdx-linux-aarch64-1.0.0.1/linux_aarch64_llvm/dynamic/stdx"]

[target.x86_64-apple-darwin]
  compile-option = "--cfg \"ohos=false\""
[target.x86_64-apple-darwin.bin-dependencies]
  path-option = ["../cangjie-stdx-mac-x64-1.0.0.1/darwin_x86_64_llvm/dynamic/stdx"]

[target.aarch64-apple-darwin]
  compile-option = "--cfg \"ohos=false\""
[target.aarch64-apple-darwin.bin-dependencies]
  path-option = ["../cangjie-stdx-mac-aarch64-1.0.0.1/darwin_aarch64_llvm/dynamic/stdx"]
